[build]
  command = "cd CreditRoot && npm install && npm run build"
  publish = "CreditRoot/dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/cetes-rate"
  to = "/.netlify/functions/cetes-rate"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200